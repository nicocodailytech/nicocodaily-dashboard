<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NICOCODAILY COMMAND CENTER</title>
  <style>
    :root {
      --bg: #0a0e1a;
      --card-bg: #0d1526;
      --card-bg2: #111828;
      --border: #1e2d4a;
      --text: #c8d8f8;
      --text-dim: #5a7090;
      --text-bright: #e8f0ff;
      --green: #00e87a;
      --blue: #3d8bff;
      --yellow: #f0c040;
      --orange: #ff8c42;
      --red: #ff4455;
      --gray: #445566;
      --dark-gray: #2a3444;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      padding: 0 0 40px;
    }

    /* Header */
    header {
      background: linear-gradient(180deg, #0c1428 0%, #0a0e1a 100%);
      border-bottom: 1px solid var(--border);
      padding: 18px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--text-bright);
    }

    .header-left .subtitle {
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .header-right {
      text-align: right;
    }

    #clock {
      font-size: 22px;
      font-weight: 300;
      color: var(--blue);
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    #clock-date {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Main layout */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 20px 20px 0;
    }

    /* Section labels */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--text-dim);
      text-transform: uppercase;
      margin-bottom: 12px;
      padding-left: 2px;
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.pending::before  { background: var(--blue); }
    .stat-card.running::before  { background: var(--green); }
    .stat-card.failed::before   { background: var(--red); }
    .stat-card.done::before     { background: var(--gray); }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    .stat-card.pending  .stat-label { color: var(--blue); }
    .stat-card.running  .stat-label { color: var(--green); }
    .stat-card.failed   .stat-label { color: var(--red); }
    .stat-card.done     .stat-label { color: var(--gray); }

    .stat-value {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text-bright);
      font-variant-numeric: tabular-nums;
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 4px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .stat-card.running .stat-value {
      color: var(--green);
    }

    /* Two-column layout */
    .layout {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }

    /* Projects grid */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .project-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, border-color 0.15s;
    }

    .project-card:hover {
      transform: translateY(-1px);
    }

    .project-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 3px;
      border-radius: 10px 0 0 10px;
    }

    .project-card.s-active    { border-color: rgba(0,232,122,0.3); }
    .project-card.s-active::after    { background: var(--green); }
    .project-card.s-progress  { border-color: rgba(61,139,255,0.3); }
    .project-card.s-progress::after  { background: var(--blue); }
    .project-card.s-planning  { border-color: rgba(240,192,64,0.3); }
    .project-card.s-planning::after  { background: var(--yellow); }
    .project-card.s-transit   { border-color: rgba(255,140,66,0.3); }
    .project-card.s-transit::after   { background: var(--orange); }
    .project-card.s-done      { border-color: rgba(68,85,102,0.4); }
    .project-card.s-done::after      { background: var(--gray); }
    .project-card.s-none      { border-color: rgba(42,52,68,0.6); }
    .project-card.s-none::after      { background: var(--dark-gray); }
    .project-card.s-pending   { border-color: rgba(68,85,102,0.4); }
    .project-card.s-pending::after   { background: var(--dark-gray); }

    .project-num {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }

    .project-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-bright);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .project-desc {
      font-size: 11px;
      color: var(--text-dim);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .project-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }

    .project-executor {
      font-size: 10px;
      color: var(--text-dim);
      background: rgba(255,255,255,0.04);
      padding: 2px 6px;
      border-radius: 4px;
    }

    .project-status-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 4px;
    }

    .project-card.s-active   .project-status-badge { color: var(--green);  background: rgba(0,232,122,0.1); }
    .project-card.s-progress .project-status-badge { color: var(--blue);   background: rgba(61,139,255,0.1); }
    .project-card.s-planning .project-status-badge { color: var(--yellow); background: rgba(240,192,64,0.1); }
    .project-card.s-transit  .project-status-badge { color: var(--orange); background: rgba(255,140,66,0.1); }
    .project-card.s-done     .project-status-badge { color: var(--gray);   background: rgba(68,85,102,0.15); }
    .project-card.s-none     .project-status-badge { color: var(--dark-gray); background: rgba(42,52,68,0.3); }
    .project-card.s-pending  .project-status-badge { color: var(--dark-gray); background: rgba(42,52,68,0.3); }

    /* Activity feed */
    .activity-panel {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .activity-header {
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .activity-list {
      max-height: 580px;
      overflow-y: auto;
    }

    .activity-list::-webkit-scrollbar { width: 4px; }
    .activity-list::-webkit-scrollbar-track { background: transparent; }
    .activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .activity-item {
      padding: 10px 16px;
      border-bottom: 1px solid rgba(30,45,74,0.5);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .activity-item:last-child { border-bottom: none; }

    .activity-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-top: 4px;
      flex-shrink: 0;
    }

    .activity-dot.done   { background: var(--green); }
    .activity-dot.failed { background: var(--red); }

    .activity-body { flex: 1; min-width: 0; }

    .activity-title {
      font-size: 12px;
      color: var(--text);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .activity-meta {
      font-size: 10px;
      color: var(--text-dim);
      margin-top: 3px;
      display: flex;
      gap: 8px;
    }

    .activity-status {
      font-weight: 600;
    }

    .activity-status.done   { color: var(--green); }
    .activity-status.failed { color: var(--red); }

    /* Footer */
    .data-footer {
      margin-top: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px;
    }

    .updated-text {
      font-size: 11px;
      color: var(--text-dim);
    }

    .refresh-btn {
      font-size: 11px;
      color: var(--blue);
      background: none;
      border: 1px solid rgba(61,139,255,0.3);
      border-radius: 5px;
      padding: 4px 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .refresh-btn:hover { background: rgba(61,139,255,0.1); }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      flex-direction: column;
      gap: 16px;
    }

    .loading-spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 12px;
      color: var(--text-dim);
      letter-spacing: 0.1em;
    }

    .error-banner {
      background: rgba(255,68,85,0.1);
      border: 1px solid rgba(255,68,85,0.3);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--red);
      font-size: 12px;
      margin-bottom: 16px;
    }

    /* Responsive */
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: repeat(2, 1fr); }
      .activity-panel { order: -1; }
      .activity-list { max-height: 300px; }
    }

    @media (max-width: 540px) {
      header { padding: 12px 16px; }
      main { padding: 12px 12px 0; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .projects-grid { grid-template-columns: 1fr; }
      #clock { font-size: 18px; }
      header h1 { font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="loading-overlay" id="loading">
  <div class="loading-spinner"></div>
  <div class="loading-text">LOADING COMMAND CENTER</div>
</div>

<header>
  <div class="header-left">
    <h1>◈ NICOCODAILY COMMAND CENTER</h1>
    <div class="subtitle">NICOCODAILY AI 指揮台 · L1/L2/L3 Architecture</div>
  </div>
  <div class="header-right">
    <div id="clock">--:--:--</div>
    <div id="clock-date">----/--/--</div>
  </div>
</header>

<main>
  <div id="error-banner" class="error-banner" style="display:none"></div>

  <!-- Stats -->
  <div class="section-label">任務佇列</div>
  <div class="stats">
    <div class="stat-card pending">
      <div class="stat-label">待執行</div>
      <div class="stat-value" id="stat-pending">—</div>
      <div class="stat-sub">等待派發</div>
    </div>
    <div class="stat-card running">
      <div class="stat-label">進行中</div>
      <div class="stat-value" id="stat-inprogress">—</div>
      <div class="stat-sub">執行中</div>
    </div>
    <div class="stat-card failed">
      <div class="stat-label">失敗</div>
      <div class="stat-value" id="stat-failed">—</div>
      <div class="stat-sub">需要處理</div>
    </div>
    <div class="stat-card done">
      <div class="stat-label">已完成</div>
      <div class="stat-value" id="stat-completed">—</div>
      <div class="stat-sub" id="stat-today">今日 — 件</div>
    </div>
  </div>

  <!-- Main layout -->
  <div class="section-label" style="margin-top:8px">專案狀態 · 13 Projects</div>
  <div class="layout">
    <div>
      <div class="projects-grid" id="projects-grid"></div>
    </div>

    <div>
      <div class="section-label">近期活動</div>
      <div class="activity-panel">
        <div class="activity-list" id="activity-list"></div>
      </div>
    </div>
  </div>

  <div class="data-footer">
    <span class="updated-text" id="updated-text">資料載入中…</span>
    <button class="refresh-btn" onclick="loadData()">↻ 刷新</button>
  </div>
</main>

<script>
const STATUS_MAP = {
  '運行中':  { cls: 's-active',   label: '運行中' },
  '進行中':  { cls: 's-progress', label: '進行中' },
  '規劃中':  { cls: 's-planning', label: '規劃中' },
  '過渡中':  { cls: 's-transit',  label: '過渡中' },
  '完成':    { cls: 's-done',     label: '完成 ✓' },
  '完成 ✅': { cls: 's-done',     label: '完成 ✓' },
  '0%':      { cls: 's-none',     label: '未開始' },
  '待定':    { cls: 's-pending',  label: '待定' },
};

function clockTick() {
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  document.getElementById('clock').textContent =
    `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  document.getElementById('clock-date').textContent =
    `${now.getFullYear()}/${pad(now.getMonth()+1)}/${pad(now.getDate())}`;
}

function timeAgo(isoStr) {
  if (!isoStr) return '未知';
  const d = new Date(isoStr);
  const diff = Math.floor((Date.now() - d) / 1000);
  if (diff < 60) return `${diff} 秒前`;
  if (diff < 3600) return `${Math.floor(diff/60)} 分鐘前`;
  if (diff < 86400) return `${Math.floor(diff/3600)} 小時前`;
  return `${Math.floor(diff/86400)} 天前`;
}

function renderProjects(projects) {
  const grid = document.getElementById('projects-grid');
  grid.innerHTML = projects.map(p => {
    const sm = STATUS_MAP[p.status] || { cls: 's-none', label: p.status };
    return `
      <div class="project-card ${sm.cls}">
        <div class="project-num">#${p.num}</div>
        <div class="project-name">${p.name}</div>
        <div class="project-desc">${p.desc}</div>
        <div class="project-footer">
          <span class="project-executor">${p.executor}</span>
          <span class="project-status-badge">${sm.label}</span>
        </div>
      </div>`;
  }).join('');
}

function renderActivity(activities) {
  const list = document.getElementById('activity-list');
  if (!activities || activities.length === 0) {
    list.innerHTML = '<div style="padding:20px;color:var(--text-dim);font-size:12px;text-align:center">暫無活動記錄</div>';
    return;
  }
  list.innerHTML = activities.map(a => {
    const isDone = a.status === '完成';
    const dotCls = isDone ? 'done' : 'failed';
    const statusCls = isDone ? 'done' : 'failed';
    const date = a.date ? a.date.substring(0, 10) : '';
    return `
      <div class="activity-item">
        <div class="activity-dot ${dotCls}"></div>
        <div class="activity-body">
          <div class="activity-title" title="${a.title}">${a.title}</div>
          <div class="activity-meta">
            <span class="activity-status ${statusCls}">${a.status}</span>
            <span>${a.executor}</span>
            <span>${date}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

async function loadData() {
  try {
    const r = await fetch(`./data.json?t=${Date.now()}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const d = await r.json();

    document.getElementById('stat-pending').textContent = d.tasks.pending ?? '—';
    document.getElementById('stat-inprogress').textContent = d.tasks.in_progress ?? '—';
    document.getElementById('stat-failed').textContent = d.tasks.failed ?? '—';
    document.getElementById('stat-completed').textContent = d.tasks.completed_total ?? '—';
    document.getElementById('stat-today').textContent = `今日 ${d.tasks.completed_today ?? 0} 件`;

    renderProjects(d.projects || []);
    renderActivity(d.activity || []);

    document.getElementById('updated-text').textContent =
      `資料更新：${timeAgo(d.updated_at)} (${d.updated_at ? new Date(d.updated_at).toLocaleTimeString('zh-TW') : '—'})`;

    document.getElementById('error-banner').style.display = 'none';
  } catch (e) {
    document.getElementById('error-banner').style.display = 'block';
    document.getElementById('error-banner').textContent =
      `⚠ 無法載入資料：${e.message}`;
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

// Init
setInterval(clockTick, 1000);
clockTick();
loadData();
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
