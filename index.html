<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#020812">
  <title>NICOCODAILY · 派工戰情</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#020812; --panel:#060f22; --panel2:#081428;
      --border:#0d2040; --border-glow:#1a4080;
      --cyan:#00d4ff; --blue:#1a6fff; --green:#00ff88;
      --yellow:#ffcc00; --orange:#ff8c00; --red:#ff2244;
      --gray:#3a5070; --text:#a0c8e8; --text-dim:#5a7da0;
      --text-bright:#d8f0ff;
    }
    *{box-sizing:border-box; margin:0; padding:0;}
    html,body{
      background:var(--bg); color:var(--text);
      font-family:'JetBrains Mono','Courier New',monospace;
      font-size:14px; line-height:1.5;
      -webkit-text-size-adjust:100%;
    }
    body{
      max-width:1100px; margin:0 auto;
      padding:0 14px env(safe-area-inset-bottom) 14px;
    }

    /* ── HEADER ── */
    header{
      position:sticky; top:0; z-index:50;
      background:linear-gradient(180deg,#030a18 0%,rgba(2,8,18,0.96) 100%);
      border-bottom:1px solid var(--border-glow);
      padding:12px 4px; margin:0 -14px 16px; padding-left:18px; padding-right:18px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      backdrop-filter:blur(6px);
    }
    .brand{display:flex; align-items:center; gap:10px; min-width:0;}
    .logo{
      width:34px; height:34px; flex-shrink:0;
      border:1px solid var(--cyan); border-radius:7px;
      display:flex; align-items:center; justify-content:center;
      color:var(--cyan); font-size:17px;
      box-shadow:0 0 12px rgba(0,212,255,.35), inset 0 0 8px rgba(0,212,255,.1);
    }
    .brand h1{font-size:14px; font-weight:700; color:var(--text-bright); letter-spacing:.08em;}
    .brand .sub{font-size:9px; color:var(--text-dim); letter-spacing:.06em; margin-top:1px;}
    .hclock{text-align:right; flex-shrink:0;}
    #clock{font-size:18px; font-weight:300; color:var(--cyan); font-variant-numeric:tabular-nums; letter-spacing:.05em;}
    #board-date{font-size:9px; color:var(--text-dim); margin-top:1px;}

    /* ── SECTION ── */
    section{margin-bottom:22px;}
    .sec-head{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
    .sec-head::before{content:''; width:3px; height:15px; background:var(--cyan); box-shadow:0 0 8px var(--cyan); border-radius:2px;}
    .sec-head h2{font-size:11px; font-weight:700; letter-spacing:.12em; color:var(--text-dim); text-transform:uppercase;}
    .sec-head .count{font-size:10px; color:var(--cyan); margin-left:auto; font-weight:700;}

    /* ── STATS ── */
    .stats{display:grid; grid-template-columns:repeat(5,1fr); gap:8px;}
    .stat{background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:10px 6px; text-align:center; position:relative; overflow:hidden;}
    .stat::after{content:''; position:absolute; top:0; left:0; right:0; height:2px;}
    .stat .n{font-size:24px; font-weight:700; color:var(--text-bright); font-variant-numeric:tabular-nums; line-height:1;}
    .stat .l{font-size:9px; color:var(--text-dim); margin-top:5px; letter-spacing:.04em;}
    .stat.user::after{background:var(--orange); box-shadow:0 0 8px var(--orange);}
    .stat.user .n{color:var(--orange);}
    .stat.live::after{background:var(--green); box-shadow:0 0 8px var(--green);}
    .stat.live .n{color:var(--green);}
    .stat.scoping::after{background:var(--blue);}
    .stat.done::after{background:var(--gray);}
    .stat.total::after{background:var(--cyan);}

    /* ── 待用戶 (priority) ── */
    .user-list{display:flex; flex-direction:column; gap:10px;}
    .user-card{
      background:linear-gradient(135deg,rgba(255,140,0,.08),rgba(255,140,0,.02));
      border:1px solid rgba(255,140,0,.4); border-left:3px solid var(--orange);
      border-radius:8px; padding:12px 14px;
    }
    .user-card .t{color:var(--text-bright); font-weight:600; font-size:13px; margin-bottom:4px;}
    .user-card .d{color:var(--text); font-size:12px; line-height:1.55;}
    .user-card.minor{border-color:var(--border); border-left-color:var(--gray); background:var(--panel2);}
    .user-card.minor .t{color:var(--text);}

    /* ── projects ── */
    .proj-grid{display:grid; grid-template-columns:1fr; gap:8px;}
    .proj{
      background:var(--panel2); border:1px solid var(--border);
      border-left:3px solid var(--gray); border-radius:8px; padding:10px 12px;
    }
    .proj-top{display:flex; align-items:center; gap:8px; margin-bottom:4px;}
    .proj .id{font-size:11px; font-weight:700; color:var(--text-dim); min-width:30px;}
    .proj .nm{font-size:13px; font-weight:600; color:var(--text-bright); flex:1; min-width:0;}
    .proj .win{font-size:9px; color:var(--text-dim); padding:1px 6px; border:1px solid var(--border); border-radius:4px; white-space:nowrap;}
    .proj .badge{font-size:14px; line-height:1;}
    .proj .desc{font-size:11px; color:var(--text); line-height:1.5;}
    .proj.live{border-left-color:var(--green);}
    .proj.partial{border-left-color:var(--yellow);}
    .proj.scoping{border-left-color:var(--blue);}
    .proj.urgent{border-left-color:var(--red); background:linear-gradient(135deg,rgba(255,34,68,.06),var(--panel2));}
    .proj.done{border-left-color:var(--gray); opacity:.78;}
    .proj.killed{border-left-color:var(--gray); opacity:.5;}
    .proj.paused{border-left-color:var(--gray); opacity:.65;}

    /* ── team ── */
    .team{display:grid; grid-template-columns:1fr; gap:8px;}
    .tm{background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:9px 12px; display:flex; align-items:center; gap:10px;}
    .tm .dot{width:8px; height:8px; border-radius:50%; background:var(--green); box-shadow:0 0 8px var(--green); flex-shrink:0;}
    .tm .info{flex:1; min-width:0;}
    .tm .nm{font-size:12px; font-weight:600; color:var(--text-bright);}
    .tm .ro{font-size:10px; color:var(--text-dim); margin-top:1px;}
    .tm .st{font-size:10px; color:var(--cyan); margin-top:3px; word-break:break-word;}
    .tm .lv{font-size:9px; padding:2px 7px; border-radius:4px; font-weight:700; flex-shrink:0; background:rgba(0,212,255,.12); color:var(--cyan); border:1px solid rgba(0,212,255,.3);}

    /* ── collapsible (priorities/snapshot) ── */
    details{background:var(--panel2); border:1px solid var(--border); border-radius:8px; margin-bottom:8px;}
    details summary{padding:10px 12px; cursor:pointer; font-size:11px; font-weight:700; letter-spacing:.08em; color:var(--text-dim); list-style:none; display:flex; align-items:center; gap:8px;}
    details summary::-webkit-details-marker{display:none;}
    details summary::before{content:'▸'; color:var(--cyan); transition:transform .15s;}
    details[open] summary::before{transform:rotate(90deg);}
    details .body{padding:0 14px 12px;}
    details li{font-size:12px; color:var(--text); margin:6px 0 6px 4px; line-height:1.5; list-style:none; padding-left:14px; position:relative;}
    details li::before{content:'·'; position:absolute; left:2px; color:var(--cyan);}

    code{background:rgba(0,212,255,.1); color:var(--cyan); padding:1px 5px; border-radius:4px; font-size:.9em; word-break:break-all;}
    strong{color:var(--text-bright);}

    /* ── footer ── */
    footer{border-top:1px solid var(--border); padding:12px 0 8px; margin-top:20px; display:flex; align-items:center; justify-content:space-between; font-size:10px; color:var(--text-dim); gap:10px; flex-wrap:wrap;}
    .sysdot{width:6px; height:6px; border-radius:50%; background:var(--green); box-shadow:0 0 6px var(--green); display:inline-block; margin-right:5px; vertical-align:middle;}
    .rbtn{background:none; border:1px solid var(--border-glow); border-radius:5px; padding:4px 10px; color:var(--cyan); font-family:inherit; font-size:10px; cursor:pointer;}
    .rbtn:active{background:rgba(0,212,255,.12);}

    #err{display:none; background:rgba(255,34,68,.1); border:1px solid var(--red); color:var(--red); padding:10px; border-radius:8px; margin-bottom:16px; font-size:12px;}

    /* ── desktop widen ── */
    @media(min-width:680px){
      .proj-grid{grid-template-columns:1fr 1fr;}
      .team{grid-template-columns:repeat(3,1fr);}
    }
    @media(min-width:980px){
      .proj-grid{grid-template-columns:1fr 1fr 1fr;}
    }
    @media(max-width:380px){
      .stats{grid-template-columns:repeat(3,1fr);}
      #clock{font-size:15px;}
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <div class="logo">◈</div>
    <div>
      <h1>派工戰情看板</h1>
      <div class="sub">NICOCODAILY · ORCHESTRATION BOARD</div>
    </div>
  </div>
  <div class="hclock">
    <div id="clock">--:--</div>
    <div id="board-date">看板 ----/--/--</div>
  </div>
</header>

<div id="err"></div>

<!-- 待用戶：最該被看到，放最前 -->
<section id="user-sec">
  <div class="sec-head"><h2>📋 待用戶（真要你的）</h2><span class="count" id="user-count"></span></div>
  <div class="user-list" id="user-list"></div>
</section>

<section>
  <div class="sec-head"><h2>一眼看</h2></div>
  <div class="stats" id="stats"></div>
</section>

<section>
  <div class="sec-head"><h2>全專案狀態 #1–#16</h2><span class="count" id="proj-count"></span></div>
  <div class="proj-grid" id="proj-grid"></div>
</section>

<section>
  <div class="sec-head"><h2>團隊</h2></div>
  <div class="team" id="team"></div>
</section>

<section id="more-sec">
  <div class="sec-head"><h2>L1 視角</h2></div>
  <details id="prio-d"><summary>明天開工優先</summary><div class="body"><ul id="prio-list"></ul></div></details>
  <details id="snap-d"><summary>過夜進度快照</summary><div class="body"><ul id="snap-list"></ul></div></details>
</section>

<footer>
  <span><span class="sysdot"></span><span id="updated">載入中…</span></span>
  <button class="rbtn" onclick="loadData()">↻ 重新整理</button>
</footer>

<script>
const STATUS_LABEL = {live:'運行',partial:'部分',scoping:'規劃',urgent:'處理',done:'完成',killed:'廢除',paused:'暫停',none:'—'};

function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
// minimal markdown: **bold** and `code` (escape first, safe)
function md(s){
  return esc(s)
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/`([^`]+?)`/g,'<code>$1</code>');
}

function clockTick(){
  const n=new Date(), p=x=>String(x).padStart(2,'0');
  document.getElementById('clock').textContent=`${p(n.getHours())}:${p(n.getMinutes())}`;
}

function renderStats(s){
  const cells=[
    ['user','待用戶',s.pending_user],
    ['live','運行中',s.live],
    ['scoping','規劃',s.scoping],
    ['done','完成',s.done],
    ['total','專案',s.total],
  ];
  document.getElementById('stats').innerHTML=cells.map(([c,l,n])=>
    `<div class="stat ${c}"><div class="n">${n??'—'}</div><div class="l">${l}</div></div>`).join('');
}

function renderUser(items){
  document.getElementById('user-count').textContent=items.length?`${items.length} 項`:'';
  if(!items.length){
    document.getElementById('user-list').innerHTML='<div class="user-card minor"><div class="t">目前沒有卡在你身上的事 ✓</div></div>';
    return;
  }
  document.getElementById('user-list').innerHTML=items.map(raw=>{
    // split "**title**：detail" / "title：detail"
    let title=raw, detail='';
    const m=raw.match(/^(.*?)[：:]\s*(.+)$/s);
    if(m){title=m[1]; detail=m[2];}
    const minor=/^小事/.test(raw.replace(/\*\*/g,''));
    return `<div class="user-card ${minor?'minor':''}"><div class="t">${md(title)}</div>${detail?`<div class="d">${md(detail)}</div>`:''}</div>`;
  }).join('');
}

function renderProjects(ps){
  document.getElementById('proj-count').textContent=`${ps.length} 個`;
  document.getElementById('proj-grid').innerHTML=ps.map(p=>{
    const tag=p.status_tag||'none';
    return `<div class="proj ${tag}">
      <div class="proj-top">
        <span class="id">#${p.num}</span>
        <span class="nm">${esc(p.name)}</span>
        ${p.window&&p.window!=='—'?`<span class="win">窗 ${esc(p.window)}</span>`:''}
        <span class="badge">${esc(p.status_emoji||'·')}</span>
      </div>
      <div class="desc">${md(p.status_text)}</div>
    </div>`;
  }).join('');
}

function renderTeam(team){
  document.getElementById('team').innerHTML=team.map(t=>
    `<div class="tm"><span class="dot"></span><div class="info">
      <div class="nm">${esc(t.name)}</div>
      <div class="ro">${esc(t.role)}</div>
      <div class="st">${md(t.state)}</div>
    </div><span class="lv">${esc(t.level)}</span></div>`).join('');
}

function renderList(id,items){
  const el=document.getElementById(id);
  el.innerHTML=(items||[]).map(x=>`<li>${md(x)}</li>`).join('')||'<li>—</li>';
}

function timeAgo(iso){
  if(!iso) return '—';
  const diff=Math.floor((Date.now()-new Date(iso))/1000);
  if(diff<60) return diff+'秒前';
  if(diff<3600) return Math.floor(diff/60)+'分鐘前';
  if(diff<86400) return Math.floor(diff/3600)+'小時前';
  return Math.floor(diff/86400)+'天前';
}

async function loadData(){
  try{
    const r=await fetch(`./data.json?t=${Date.now()}`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    document.getElementById('err').style.display='none';
    renderStats(d.stats||{});
    renderUser(d.pending_user||[]);
    renderProjects(d.projects||[]);
    renderTeam(d.team||[]);
    renderList('prio-list',d.priorities);
    renderList('snap-list',d.snapshot);
    if(d.board_updated) document.getElementById('board-date').textContent='看板 '+d.board_updated;
    document.getElementById('updated').textContent=`資料 ${timeAgo(d.generated_at)} 產出`;
  }catch(e){
    const el=document.getElementById('err');
    el.style.display='block';
    el.textContent='載入 data.json 失敗：'+e.message;
  }
}

setInterval(clockTick,1000); clockTick();
loadData();
setInterval(loadData,5*60*1000);
</script>
</body>
</html>
