name: Update & Deploy Dashboard

on:
  schedule:
    - cron: '*/15 * * * *'
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'fetch_data.py'
      - '派工看板.md'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Parse 派工看板.md (synced from the private brain repo) into data.json.
      # Pure stdlib — no network, no Notion, no secrets.
      - name: Build data.json from 派工看板.md
        run: python fetch_data.py
        env:
          BOARD_PATH: 派工看板.md

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
